[0x10,0x48,0x20,0x00,0x00,0x00,0x00,0x00],[0x70,0x50,0x70,0x00,0x00,0x00,0x00,0x00],
[0x00,0x3C,0x7E,0x7E,0x7E,0x7E,0x3C,0x00],[0x00,0x3C,0x42,0x42,0x42,0x42,0x3C,0x00],
[0x10,0x38,0x7C,0xFE,0xFE,0x38,0x7C,0x00],[0x6C,0xFE,0xFE,0xFE,0x7C,0x38,0x10,0x00],
[0x10,0x38,0x7C,0xFE,0x7C,0x38,0x10,0x00],[0x38,0x38,0xFE,0xFE,0xD6,0x10,0x7C,0x00],
[0x01,0x03,0x07,0x0F,0x1F,0x3F,0x7F,0xFF],[0x80,0xC0,0xE0,0xF0,0xF8,0xFC,0xFE,0xFF],
[0x81,0x42,0x24,0x18,0x18,0x24,0x42,0x81],[0xF0,0xF0,0xF0,0xF0,0x00,0x00,0x00,0x00],
[0x00,0x00,0x00,0x00,0xF0,0xF0,0xF0,0xF0],[0x0F,0x0F,0x0F,0x0F,0x00,0x00,0x00,0x00],
[0x00,0x00,0x00,0x00,0x0F,0x0F,0x0F,0x0F],[0x0F,0x0F,0x0F,0x0F,0xF0,0xF0,0xF0,0xF0],
[0xF0,0xF0,0xF0,0xF0,0x0F,0x0F,0x0F,0x0F],[0xFF,0x81,0x81,0x81,0x81,0x81,0x81,0xFF],
[0xAA,0x55,0xAA,0x55,0xAA,0x55,0xAA,0x55],[0x10,0x10,0x7C,0x10,0x10,0x10,0xFE,0x00],
[0x38,0x44,0xBA,0x10,0x38,0x54,0xFE,0x00],[0x10,0x10,0xFE,0x10,0x38,0x54,0x92,0x00],
[0x10,0x16,0xF8,0x38,0x54,0x54,0xB2,0x00],[0x10,0x54,0x54,0x54,0x10,0x28,0x44,0x00],
[0x7C,0x44,0x7C,0x44,0x7C,0x44,0x8C,0x00],[0x7C,0x44,0x44,0x7C,0x44,0x44,0x7C,0x00],
[0x08,0xFC,0xA8,0xFE,0xA4,0xFE,0x14,0x00],[0x38,0x44,0x82,0x7C,0x24,0x24,0x4C,0x00],
[0x74,0x24,0xFE,0x2E,0x76,0xA4,0x28,0x00],[0x20,0x7C,0x90,0x7C,0x50,0xFC,0x10,0x00],
[0xFE,0x92,0x92,0xFE,0x82,0x82,0x86,0x00],[0x10,0x10,0x10,0x10,0x28,0x28,0xC6,0x00],
[0x10,0x90,0xFC,0x90,0x3C,0x10,0xFE,0x00],[0x00,0x7C,0x00,0xFE,0x10,0x10,0x10,0x00]
        ];

        var SCALE = 3;
        var CELL = 8 * SCALE;  // 24
        var HDR_W = 32;
        var HDR_H = 18;
        var COLS = 16;
        var ROWS = 16;

        // Build reverse map from tokenizer
        var reverseMap = {};
        var tok = window.X1PenTokenizer || {};
        if (tok.UNICODE_TO_X1) {
            for (var uc in tok.UNICODE_TO_X1) {
                var x1 = tok.UNICODE_TO_X1[uc];
                if (!Array.isArray(x1)) {
                    if (!reverseMap[x1]) reverseMap[x1] = { unicodeChars: [], names: [] };
                    reverseMap[x1].unicodeChars.push(parseInt(uc));
                }
            }
        }
        if (tok.NAMED_ESCAPES) {
            for (var name in tok.NAMED_ESCAPES) {
                var x1n = tok.NAMED_ESCAPES[name];
                if (!reverseMap[x1n]) reverseMap[x1n] = { unicodeChars: [], names: [] };
                reverseMap[x1n].names.push(name);
            }
        }

        // Prefer full-width katakana over half-width for display
        function bestUnicode(ucList) {
            if (!ucList || ucList.length === 0) return null;
            // Prefer: kanji > full-width kana > symbols > half-width kana
            var best = ucList[0];
            for (var i = 1; i < ucList.length; i++) {
                var c = ucList[i];
                if (c >= 0x4E00 && c <= 0x9FFF) { best = c; break; } // kanji
                if (c >= 0x3000 && c <= 0x30FF && best >= 0xFF00) best = c; // full > half
            }
            return best;
        }

        function getCharInfo(code) {
            var info = { code: code, ascii: null, unicode: null, names: [], inputs: [] };
            if (code >= 0x20 && code <= 0x7E) {
                info.ascii = String.fromCharCode(code);
                info.inputs.push(info.ascii);
            }
            var rm = reverseMap[code];
            if (rm) {
                info.names = rm.names;
                if (rm.unicodeChars.length > 0) {
                    var best = bestUnicode(rm.unicodeChars);
                    info.unicode = String.fromCharCode(best);
                    info.inputs.push(info.unicode);
                    // Add alternatives
                    for (var i = 0; i < rm.unicodeChars.length; i++) {
                        var alt = String.fromCharCode(rm.unicodeChars[i]);
                        if (alt !== info.unicode && info.inputs.indexOf(alt) < 0)
                            info.inputs.push(alt);
                    }
                }
                if (rm.names.length > 0)
                    info.inputs.push('\\{' + rm.names[0] + '}');
            }
            info.inputs.push('\\x' + ('0'+code.toString(16).toUpperCase()).slice(-2));
            return info;
        }

        // Draw glyph
        function drawGlyph(ctx, code, x, y, scale, color) {
            ctx.fillStyle = color || '#c9d1d9';
            var g = F[code];
            for (var r = 0; r < 8; r++) {
                var b = g[r];
                for (var bit = 0; bit < 8; bit++) {
                    if (b & (0x80 >> bit))
                        ctx.fillRect(x + bit * scale, y + r * scale, scale, scale);
                }
            }
        }

        // Draw grid
        var canvas = document.getElementById('fontCanvas');
        var W = HDR_W + CELL * COLS;
        var H = HDR_H + CELL * ROWS;
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        var ctx = canvas.getContext('2d');

        function renderGrid(highlightCode) {
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, W, H);

            // Column headers
            ctx.fillStyle = '#556';
            ctx.font = '10px Courier New';
            ctx.textAlign = 'center';
            for (var c = 0; c < COLS; c++) {
                ctx.fillText('x' + c.toString(16).toUpperCase(), HDR_W + c * CELL + CELL/2, 13);
            }

            // Row headers + chars
            for (var r = 0; r < ROWS; r++) {
                ctx.fillStyle = '#556';
                ctx.textAlign = 'right';
                ctx.fillText('$' + r.toString(16).toUpperCase(), HDR_W - 4, HDR_H + r * CELL + CELL/2 + 4);

                for (var col = 0; col < COLS; col++) {
                    var code = r * 16 + col;
                    var cx = HDR_W + col * CELL;
                    var cy = HDR_H + r * CELL;

                    // Cell border
                    ctx.strokeStyle = '#222';
                    ctx.strokeRect(cx + 0.5, cy + 0.5, CELL - 1, CELL - 1);

                    // Highlight
                    if (code === highlightCode) {
                        ctx.fillStyle = 'rgba(233,69,96,0.25)';
                        ctx.fillRect(cx, cy, CELL, CELL);
                    }

                    // Glyph
                    var color = (code < 0x20) ? '#333' : '#c9d1d9';
                    drawGlyph(ctx, code, cx, cy, SCALE, color);
                }
            }
        }
        renderGrid(-1);

        // Hover
        var hoverInfo = document.getElementById('hoverInfo');
        var lastHover = -1;

        canvas.addEventListener('mousemove', function(e) {
            var rect = canvas.getBoundingClientRect();
            var mx = e.clientX - rect.left;
            var my = e.clientY - rect.top;
            var col = Math.floor((mx - HDR_W) / CELL);
            var row = Math.floor((my - HDR_H) / CELL);
            if (col < 0 || col >= 16 || row < 0 || row >= 16) {
                if (lastHover >= 0) { renderGrid(-1); lastHover = -1; }
                return;
            }
            var code = row * 16 + col;
            if (code === lastHover) return;
            lastHover = code;
            renderGrid(code);

            var info = getCharInfo(code);
            var html = '<canvas id="hoverGlyph" width="24" height="24" style="background:#0d1117;border:1px solid #333;border-radius:2px"></canvas>';
            html += '<span class="code">$' + ('0'+code.toString(16).toUpperCase()).slice(-2) + '</span>';
            if (info.names.length > 0) html += '<span class="name">\\{' + info.names[0] + '}</span>';
            if (info.unicode) html += '<span style="color:#c9d1d9;font-size:1.2em">' + info.unicode + '</span>';
            html += '<span class="input">' + info.inputs.join(' &nbsp; ') + '</span>';
            hoverInfo.innerHTML = html;

            var hg = document.getElementById('hoverGlyph');
            if (hg) drawGlyph(hg.getContext('2d'), code, 0, 0, 3, '#c9d1d9');
        });

        canvas.addEventListener('mouseleave', function() {
            renderGrid(-1);
            lastHover = -1;
            hoverInfo.innerHTML = '<span style="color:#556">Hover over a character</span>';
        });

        // Table
        var sections = [
            { title: '$20-$7F: ASCII', from: 0x20, to: 0x7F },
            { title: '$80-$9F: Graphics / Box Drawing', from: 0x80, to: 0x9F },
            { title: '$A0-$DF: Katakana (JIS X 0201)', from: 0xA0, to: 0xDF },
            { title: '$E0-$FF: Symbols / Kanji', from: 0xE0, to: 0xFF },
        ];

        var container = document.getElementById('tableContainer');
        sections.forEach(function(sec) {
            var h = document.createElement('div');
            h.className = 'section-title';
            h.textContent = sec.title;
            container.appendChild(h);

            var table = document.createElement('table');
            table.innerHTML = '<tr><th>Code</th><th>Char</th><th>Name</th><th>Input</th></tr>';
            for (var code = sec.from; code <= sec.to; code++) {
                var info = getCharInfo(code);
                var tr = document.createElement('tr');

                var tdCode = document.createElement('td');
                tdCode.className = 'code';
                tdCode.textContent = '$' + ('0'+code.toString(16).toUpperCase()).slice(-2);
                tr.appendChild(tdCode);

                var tdGlyph = document.createElement('td');
                tdGlyph.className = 'glyph';
                var gc = document.createElement('canvas');
                gc.width = 16; gc.height = 16;
                gc.style.width = '16px'; gc.style.height = '16px';
                drawGlyph(gc.getContext('2d'), code, 0, 0, 2, '#c9d1d9');
                tdGlyph.appendChild(gc);
                tr.appendChild(tdGlyph);

                var tdName = document.createElement('td');
                tdName.className = 'name';
                tdName.textContent = info.names.length > 0 ? info.names[0] : '';
                tr.appendChild(tdName);

                var tdInput = document.createElement('td');
                tdInput.className = 'input';
                tdInput.textContent = info.inputs.slice(0, -1).join('  ') || info.inputs[info.inputs.length-1];
                tr.appendChild(tdInput);

                table.appendChild(tr);
            }
            container.appendChild(table);
        });
    })();
    </script>
