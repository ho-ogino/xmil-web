<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob:; worker-src blob:; object-src 'none'; base-uri 'none';">
    <title>X1Pen - FuzzyBASIC IDE</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── ツールバー ── */
        #x1pen-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #x1pen-toolbar .brand {
            font-weight: bold;
            font-size: 1.1em;
            color: #e94560;
            margin-right: 8px;
            white-space: nowrap;
        }

        #x1pen-toolbar button {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            padding: 4px 14px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            background: #1a1a2e;
            color: #e0e0e0;
            transition: background 0.15s;
        }

        #x1pen-toolbar button:hover:not(:disabled) {
            background: #0f3460;
        }

        #x1pen-toolbar button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        #btn-run {
            background: #0a4d2e !important;
            border-color: #0d7a47 !important;
            color: #7dffb3 !important;
        }
        #btn-run:hover:not(:disabled) {
            background: #0d7a47 !important;
        }

        #btn-stop {
            background: #4d0a0a !important;
            border-color: #7a0d0d !important;
            color: #ff7d7d !important;
        }
        #btn-stop:hover:not(:disabled) {
            background: #7a0d0d !important;
        }

        #x1pen-status {
            margin-left: auto;
            font-size: 0.85em;
            color: #888;
            white-space: nowrap;
        }

        /* ── メインレイアウト ── */
        #x1pen-main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ── エディタパネル ── */
        #editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0f3460;
            min-width: 0;
        }

        #editor-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            font-size: 0.8em;
            color: #888;
            flex-shrink: 0;
        }

        #basic-editor {
            flex: 1;
            width: 100%;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        #basic-editor::placeholder {
            color: #484f58;
        }

        /* ── エミュレータパネル ── */
        #emu-panel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 8px;
            min-width: 0;
        }

        #canvas {
            display: block;
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── FDD ボタン ── */
        .fdd-buttons {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }
        .fdd-btn {
            font-family: 'Courier New', monospace;
            font-size: 0.75em;
            padding: 3px 8px;
            border: 1px solid #1a4a88;
            border-radius: 3px;
            cursor: pointer;
            background: #0d1e36;
            color: #5599ee;
            transition: all 0.15s;
        }
        .fdd-btn:hover { background: #0d2244; border-color: #3a7acc; color: #88bbff; }

        /* ── ファイルライブラリ パネル ── */
        .library-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.78);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .library-panel-inner {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            width: 700px;
            max-width: 96vw;
            max-height: 82vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .lib-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 16px; border-bottom: 1px solid #2e2e2e;
            background: #111; flex-shrink: 0;
        }
        .lib-panel-title {
            font-size: 0.9em; font-weight: bold; color: #bbb;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .lib-close-btn {
            background: none; border: 1px solid #3a3a3a; color: #666;
            font-size: 0.75em; padding: 3px 10px; border-radius: 3px;
            cursor: pointer; font-family: inherit; transition: all 0.1s;
        }
        .lib-close-btn:hover { border-color: #cc4444; color: #ff7777; }
        .lib-filters {
            display: flex; align-items: center; gap: 5px;
            padding: 9px 14px; border-bottom: 1px solid #222;
            background: #131313; flex-shrink: 0; flex-wrap: wrap;
        }
        .lib-filter {
            background: #1e1e1e; border: 1px solid #333; color: #555;
            font-size: 0.7em; padding: 4px 13px; border-radius: 3px;
            cursor: pointer; font-family: 'Courier New', monospace;
            letter-spacing: 1px; transition: all 0.1s;
        }
        .lib-filter:hover { border-color: #666; color: #999; }
        .lib-filter.active { background: #2a1012; border-color: #c0404a; color: #ff9090; }
        .lib-add-btn {
            margin-left: auto; background: #0a1e0a; border: 1px solid #225522;
            color: #44aa44; font-size: 0.75em; padding: 5px 14px;
            border-radius: 3px; cursor: pointer; font-family: inherit;
            letter-spacing: 0.3px; transition: all 0.1s;
        }
        .lib-add-btn:hover { background: #162816; border-color: #44aa44; color: #88ff88; }
        .lib-fav-filter {
            background: #1e1e1e; border: 1px solid #333; color: #555;
            font-size: 0.8em; padding: 4px 10px; border-radius: 3px;
            cursor: pointer; transition: all 0.1s; margin-left: 2px;
        }
        .lib-fav-filter:hover { border-color: #886622; color: #ccaa44; }
        .lib-fav-filter.active { background: #2a2210; border-color: #aa8833; color: #ffcc44; }
        .lib-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-bottom: 1px solid #222;
            background: #151515; flex-shrink: 0;
        }
        .lib-search-input {
            flex: 1; background: #111; border: 1px solid #333; color: #aaa;
            padding: 5px 9px; border-radius: 3px; font-size: 0.82em;
            font-family: 'Courier New', monospace; outline: none; min-width: 0;
        }
        .lib-search-input:focus { border-color: #666; }
        .lib-search-input::placeholder { color: #444; }
        .lib-sort-select {
            background: #1a1a1a; border: 1px solid #333; color: #888;
            padding: 5px 8px; border-radius: 3px; font-size: 0.78em;
            font-family: inherit; outline: none; cursor: pointer; flex-shrink: 0;
        }
        .lib-sort-select:focus { border-color: #666; }
        .lib-sort-select option { background: #1a1a1a; color: #aaa; }
        .lib-fav-btn {
            background: none; border: 1px solid transparent; color: #333;
            padding: 2px 4px; cursor: pointer; font-size: 0.95em;
            transition: all 0.1s; flex-shrink: 0; line-height: 1;
        }
        .lib-fav-btn:hover { color: #886622; }
        .lib-fav-btn.favorited { color: #ccaa44; }
        .lib-list {
            flex: 1; overflow-y: auto; padding: 8px 10px; min-height: 100px;
        }
        .lib-empty {
            text-align: center; padding: 36px 20px; color: #444;
            font-size: 0.85em; line-height: 1.8;
        }
        .lib-empty small { color: #333; }
        .lib-row {
            display: flex; align-items: center; gap: 7px;
            padding: 6px 8px; border-radius: 4px; border: 1px solid transparent;
            margin-bottom: 3px; transition: background 0.1s;
        }
        .lib-row:hover { background: #222; }
        .lib-row.mounted { background: #151d10; border-color: #253a18; }
        .lib-type-badge {
            font-size: 0.58em; font-weight: bold; letter-spacing: 1px;
            padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
            font-family: 'Courier New', monospace;
        }
        .lib-badge-fdd { background: #0d1e36; border: 1px solid #1a4a88; color: #5599ee; }
        .lib-badge-hdd { background: #281c00; border: 1px solid #775500; color: #ccaa44; }
        .lib-badge-cmt { background: #0a180a; border: 1px solid #1e4a1e; color: #44aa44; }
        .lib-badge-emm { background: #1e1020; border: 1px solid #553388; color: #9966cc; }
        .lib-file-name {
            flex: 1; font-size: 0.82em; color: #aaa; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; font-family: monospace; min-width: 0;
        }
        .lib-file-size {
            font-size: 0.7em; color: #484848; white-space: nowrap;
            flex-shrink: 0; min-width: 46px; text-align: right;
        }
        .lib-row-btns { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
        .lib-mount-btn {
            background: #161628; border: 1px solid #2a2a55; color: #4a4a99;
            font-size: 0.63em; padding: 3px 9px; border-radius: 3px;
            cursor: pointer; font-family: 'Courier New', monospace;
            letter-spacing: 0.5px; transition: all 0.1s; white-space: nowrap;
        }
        .lib-mount-btn:hover { border-color: #6666cc; color: #9999ff; background: #1e1e3a; }
        .lib-mount-btn.active { background: #162010; border-color: #338833; color: #66ee66; }
        .lib-dl-btn, .lib-del-btn {
            background: none; border: 1px solid transparent;
            font-size: 0.82em; padding: 2px 7px; border-radius: 3px;
            cursor: pointer; transition: all 0.1s;
        }
        .lib-dl-btn { color: #3a4a55; }
        .lib-dl-btn:hover { background: #161e28; border-color: #3a5a77; color: #7aaccc; }
        .lib-del-btn { color: #3a2222; }
        .lib-del-btn:hover { background: #201616; border-color: #663333; color: #bb5555; }
        .lib-drive-pick-btn {
            background: #0a1a2e; border: 1px solid #1a4a88; color: #5599ee;
            font-size: 0.72em; padding: 4px 12px; border-radius: 3px; cursor: pointer;
            font-family: 'Courier New', monospace; letter-spacing: 0.5px; transition: all 0.1s;
        }
        .lib-drive-pick-btn:hover { background: #0d2244; border-color: #3a7acc; color: #88bbff; }
        .lib-capacity {
            padding: 6px 14px; font-size: 0.72em; color: #444;
            border-top: 1px solid #222; text-align: right; flex-shrink: 0;
        }
        .hidden { display: none !important; }

        /* ── レスポンシブ ── */
        @media (max-width: 900px) {
            #x1pen-main {
                flex-direction: column;
            }
            #editor-panel {
                border-right: none;
                border-bottom: 1px solid #0f3460;
                flex: 1;
            }
            #emu-panel {
                flex: 0 0 auto;
            }
        }
    </style>
</head>
<body>
    <div id="x1pen-toolbar">
        <span class="brand">X1Pen</span>
        <button id="btn-run" disabled title="Ctrl+Enter">&#x25B6; RUN</button>
        <button id="btn-stop" title="Escape">&#x25A0; STOP</button>
        <div class="fdd-buttons">
            <button class="fdd-btn" id="btn-fdd0" title="FDD Drive 0">FDD0</button>
            <button class="fdd-btn" id="btn-fdd1" title="FDD Drive 1">FDD1</button>
        </div>
        <span id="x1pen-status">Loading...</span>
    </div>
    <div id="x1pen-main">
        <div id="editor-panel">
            <div id="editor-header">FuzzyBASIC</div>
            <textarea id="basic-editor" spellcheck="false" wrap="off"
                placeholder="10 PRINT &quot;HELLO WORLD&quot;&#10;20 GOTO 10"></textarea>
        </div>
        <div id="emu-panel">
            <canvas id="canvas" width="640" height="400"></canvas>
        </div>
    </div>

<!-- ファイルライブラリ パネル -->
<div id="library-panel" class="library-panel hidden">
    <div class="library-panel-inner">
        <div class="lib-panel-header">
            <span class="lib-panel-title">File Library</span>
            <button class="lib-close-btn" id="lib-close-btn">&#x2715; Close</button>
        </div>
        <div class="lib-filters">
            <button class="lib-filter active" data-type="all">ALL</button>
            <button class="lib-filter" data-type="fdd">FDD</button>
            <button class="lib-filter" data-type="hdd">HDD</button>
            <button class="lib-filter" data-type="cmt">CMT</button>
            <button class="lib-filter" data-type="emm">EMM</button>
            <button class="lib-fav-filter" id="lib-fav-filter" title="Show favorites only">&#x2606;</button>
            <button class="lib-add-btn" id="lib-add-btn">&#xFF0B; Add</button>
        </div>
        <div class="lib-toolbar" id="lib-toolbar">
            <input type="text" class="lib-search-input" id="lib-search-input"
                   placeholder="Search..." autocomplete="off" />
            <select class="lib-sort-select" id="lib-sort-select">
                <option value="name">Name</option>
                <option value="type-name">Type &rarr; Name</option>
                <option value="date-desc">Date (newest)</option>
                <option value="size-desc">Size (largest)</option>
            </select>
        </div>
        <div id="library-list" class="lib-list"></div>
        <div id="library-capacity" class="lib-capacity"></div>
    </div>
</div>
<input type="file" id="file-add-to-library" multiple style="display:none"
       accept=".d88,.2d,.d77,.xdf,.hdm,.dup,.hdi,.thd,.nhd,.hdd,.hdn,.t98,.bin,.cmt,.cas,.mem">

    <script src="storage.js"></script>
    <script src="x1pen_tokenizer.js"></script>
    <script src="x1pen.js"></script>
    <!-- Emscripten バンドル (pre.js 内蔵) -->
    <script src="xmillennium.js"></script>
</body>
</html>
